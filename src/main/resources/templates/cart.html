<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Shopping Cart</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 24px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        .button { padding: 8px 14px; background: #2a7ae2; color: #fff; border: none; cursor: pointer; }
        .button-secondary { background: #666; }
        .summary { margin-top: 16px; }
        .container { max-width: 720px; margin: auto; }
    </style>
</head>
<body>
<div class="container">
    <h1>Your Cart</h1>
    <div th:if="${empty}">
        <p>Your cart is empty.</p>
        <p>Total: <strong>$0.00</strong></p>
    </div>
    <div th:unless="${empty}">
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Unit Price</th>
                    <th>Quantity</th>
                    <th>Line Total</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="entry : ${entries}">
                    <td th:text="${entry.name}"></td>
                    <td th:text="${entry.unitPrice}"></td>
                    <td th:text="${entry.quantity}"></td>
                    <td th:text="${entry.lineTotal}"></td>
                </tr>
            </tbody>
        </table>
        <div class="summary">
            <p>Total: <strong th:text="${total}"></strong></p>
            <form th:action="@{/cart/clear}" method="post" style="display:inline-block;">
                <button type="submit" class="button button-secondary">Clear cart</button>
            </form>
        </div>
    </div>
    <p><a th:href="@{/catalog}" class="button">Back to catalog</a></p>
</div>
</body>
</html>
